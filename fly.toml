app = 'otomat-ihale-api'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "sqlite:////data/prod.db"
  PYTHONPATH = "/app/backend:/app"
  ENVIRONMENT = "production"
  DEBUG = "false"
  AUTH_DISABLED = "false"
  SCHEDULER_ENABLED = "true"
  SCHEDULER_INTERVAL_MINUTES = "30"
  AUTO_PURGE_MOCK_DATA = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "otomat_data"
  destination = "/data"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
