# Render Blueprint — Backend API
# https://dashboard.render.com → New → Blueprint → Repo bağla
databases:
  - name: otomat-ihale-db
    databaseName: tender_tracker
    plan: free

services:
  - type: web
    runtime: docker
    name: otomat-ihale-api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health/live
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: otomat-ihale-db
          property: connectionString
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: AUTH_DISABLED
        value: "false"
